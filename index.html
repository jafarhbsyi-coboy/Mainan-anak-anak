<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Mainan Murah</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:#ff6600; color:white; padding:15px; text-align:center; font-size:20px;}
.container {display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; padding:15px;}
.card {background:white; padding:10px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.2);}
.card img {width:100%; border-radius:10px;}
.btn {display:block; margin-top:10px; padding:10px; text-align:center; border-radius:8px; text-decoration:none;}
.buy {background:#28a745; color:white;}
.wa {background:#25d366; color:white;}
</style>
</head>
<body><header>🛒 Toko Mainan Viral Murah</header><div class="container"><div class="card">
<img src="https://via.placeholder.com/200">
<h3>Mainan Anak Edukasi</h3>
<p>Rp 50.000</p>
<a class="btn buy" onclick="beli('Mainan Anak Edukasi','50000')">Beli</a>
<a class="btn wa" href="https://wa.me/6282299357141?text=Saya mau beli Mainan Anak Edukasi" target="_blank">Chat WhatsApp</a>
<canvas id="qr1"></canvas>
</div><div class="card">
<img src="https://via.placeholder.com/200">
<h3>Mainan Mobil Remote</h3>
<p>Rp 70.000</p>
<a class="btn buy" onclick="beli('Mainan Mobil Remote','70000')">Beli</a>
<a class="btn wa" href="https://wa.me/6282299357141?text=Saya mau beli Mainan Mobil Remote" target="_blank">Chat WhatsApp</a>
<canvas id="qr2"></canvas>
</div></div><script>
function beli(nama,harga){
 alert('Terima kasih sudah membeli '+nama+' seharga Rp '+harga);
}

QRCode.toCanvas(document.getElementById('qr1'), 'https://wa.me/6281234567890?text=Saya mau beli Mainan Anak Edukasi');
QRCode.toCanvas(document.getElementById('qr2'), 'https://wa.me/6281234567890?text=Saya mau beli Mainan Mobil Remote');
</script></body>
</html>
